<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eunoia Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--bg:#0a0b10;--surface:#11131a;--s2:#181b25;--s3:#1e2230;--border:#232736;--accent:#a78bfa;--text:#edeef5;--muted:#5c6070;--dim:#9095a8;--green:#34d399;}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(167,139,250,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(167,139,250,.015) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
    #app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px 60px;}
    .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px;}
    .header-left{display:flex;align-items:center;gap:12px;}
    .logo-img{width:38px;height:38px;border-radius:11px;object-fit:cover;flex-shrink:0;}
    .logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-sub{font-size:11px;color:var(--muted);}
    .back-btn{padding:8px 14px;background:var(--s2);border:1px solid var(--border);border-radius:9px;color:var(--dim);font-family:'DM Sans',sans-serif;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;text-decoration:none;}
    .back-btn:hover{border-color:var(--accent);color:#c4b5fd;}
    .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px;}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
    .stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}
    .legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--dim);padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:999px;}
    .legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .plan-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
    .plan-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
    .module-chips{display:flex;flex-wrap:wrap;gap:6px;}
    .mod-chip{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:#c4b5fd;}
    .day-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden;transition:box-shadow .2s;}
    .day-card:hover{box-shadow:0 4px 20px rgba(167,139,250,.1);}
    .day-card.rest{opacity:.85;}
    .day-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
    .day-header-left{display:flex;align-items:center;gap:10px;}
    .day-num{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);}
    .day-badge{font-size:10px;padding:2px 8px;border-radius:999px;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.2);color:#c4b5fd;font-weight:500;}
    .day-badge.rest{background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.2);color:#94a3b8;}
    .day-header-right{display:flex;align-items:center;gap:8px;}
    .session-count{font-size:11px;color:var(--muted);}
    .chevron{font-size:13px;color:var(--muted);transition:transform .2s;}
    .day-card.open .chevron{transform:rotate(180deg);}
    .sessions{display:none;padding:10px 12px 12px;}
    .day-card.open .sessions{display:flex;flex-direction:column;gap:8px;}
    .session{display:flex;gap:10px;padding:11px 13px;border-radius:10px;border:1px solid var(--border);background:var(--s2);transition:all .2s;position:relative;overflow:hidden;cursor:pointer;}
    .session::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
    .session:hover{transform:translateX(2px);box-shadow:0 2px 12px rgba(0,0,0,.3);}
    .session-time{display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:52px;}
    .session-start{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text);}
    .session-end{font-size:10px;color:var(--muted);}
    .session-dur{font-size:9.5px;color:var(--muted);margin-top:2px;background:var(--s3);padding:2px 5px;border-radius:4px;}
    .session-divider{width:1px;background:var(--border);flex-shrink:0;align-self:stretch;margin:2px 0;}
    .session-body{flex:1;min-width:0;}
    .session-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
    .session-module{font-size:11px;color:var(--muted);}
    .session-tip{font-size:11.5px;color:var(--dim);margin-top:6px;line-height:1.5;padding:6px 9px;background:rgba(167,139,250,.05);border-radius:7px;border:1px solid rgba(167,139,250,.1);display:none;}
    .session.expanded .session-tip{display:block;}
    .session-icon{font-size:18px;flex-shrink:0;align-self:center;}
    .empty{text-align:center;padding:60px 20px;color:var(--muted);}
    .empty-icon{font-size:48px;margin-bottom:12px;}
    .export-btn{padding:8px 14px;background:linear-gradient(135deg,rgba(167,139,250,.13),rgba(129,140,248,.08));border:1px solid rgba(167,139,250,.22);border-radius:9px;color:#c4b5fd;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
    .export-btn:hover{background:linear-gradient(135deg,rgba(167,139,250,.22),rgba(129,140,248,.15));border-color:rgba(167,139,250,.4);}
    @media print{body{background:#fff;color:#000;}.back-btn,.export-btn{display:none;}.day-card{break-inside:avoid;}.sessions{display:flex!important;}}
    @media(max-width:500px){.summary{grid-template-columns:repeat(2,1fr);}.session{flex-wrap:wrap;}}
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-left">
      <img src="/eunoia-logo.png" class="logo-img" alt="Eunoia">
      <div>
        <div class="logo-name">Eunoia</div>
        <div class="logo-sub">Your Study Plan</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="export-btn" onclick="window.print()">🖨️ Print / Save PDF</button>
      <a class="back-btn" href="javascript:window.close()">← Back to Chat</a>
    </div>
  </div>
  <div id="content">
    <div class="empty">
      <div class="empty-icon">📅</div>
      <div>No plan loaded. Go back to the chat and ask Eunoia to build you a study plan!</div>
    </div>
  </div>
</div>
<script>
  const SESSION_COLORS = {
    "Learn":"#6366f1","Active Recall":"#8b5cf6","Past Papers":"#a78bfa",
    "Review Gaps":"#ec4899","Mind Map":"#f59e0b","Flashcards":"#10b981",
    "Practice Test":"#ef4444","Rest & Review":"#64748b",
  };
  const LEGEND_ITEMS = Object.entries(SESSION_COLORS);

  function renderPlan(plan) {
    const content = document.getElementById("content");
    if (!plan || !plan.items || !plan.items.length) return;
    const s = plan.summary || {}, inp = plan.inputs || {}, modules = inp.modules || [];
    const byDay = {};
    plan.items.forEach(item => { if(!byDay[item.day]) byDay[item.day]=[]; byDay[item.day].push(item); });
    const dayKeys = Object.keys(byDay).sort();
    let html = `
      <div class="summary">
        <div class="stat-card"><div class="stat-num">${s.days_until_exam||"?"}</div><div class="stat-lbl">Days until exam</div></div>
        <div class="stat-card"><div class="stat-num">${s.total_sessions||plan.items.length}</div><div class="stat-lbl">Study sessions</div></div>
        <div class="stat-card"><div class="stat-num">${s.total_hours||"?"}h</div><div class="stat-lbl">Total study time</div></div>
        <div class="stat-card"><div class="stat-num">${modules.length||1}</div><div class="stat-lbl">Module${modules.length!==1?"s":""}</div></div>
      </div>
      <div class="legend">${LEGEND_ITEMS.map(([n,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${n}</div>`).join("")}</div>
      <div class="plan-title-row">
        <div class="plan-title">📅 Your Revision Schedule</div>
        <div class="module-chips">${modules.map(m=>`<div class="mod-chip">${m}</div>`).join("")}</div>
      </div>
      ${dayKeys.map((dayKey,idx)=>{
        const sessions=byDay[dayKey], first=sessions[0], isRest=first.is_rest_day;
        const dayLabel=first.day_label||dayKey;
        const totalMins=sessions.reduce((a,s)=>a+(s.duration_min||0),0);
        const totalHoursDay=totalMins>=60?(totalMins/60).toFixed(1)+"h":totalMins+"min";
        return `<div class="day-card ${isRest?"rest":""} ${idx===0?"open":""}" id="day-${idx}">
          <div class="day-header" onclick="toggleDay(${idx})">
            <div class="day-header-left">
              <div class="day-num">${dayLabel}</div>
              <div class="day-badge ${isRest?"rest":""}">${isRest?"Rest & Review":totalHoursDay+" study"}</div>
            </div>
            <div class="day-header-right">
              <div class="session-count">${sessions.length} session${sessions.length!==1?"s":""}</div>
              <div class="chevron">▾</div>
            </div>
          </div>
          <div class="sessions">${sessions.map((s,si)=>{
            const color=s.color||SESSION_COLORS[s.session_type]||"#6366f1";
            return `<div class="session" id="sess-${idx}-${si}" onclick="toggleSession(${idx},${si})">
              <style>#sess-${idx}-${si}::before{background:${color};}</style>
              <div class="session-time">
                <div class="session-start">${s.start_time}</div>
                <div class="session-end">${s.end_time}</div>
                <div class="session-dur">${s.duration_min}min</div>
              </div>
              <div class="session-divider"></div>
              <div class="session-body">
                <div class="session-title">${s.emoji||""} ${s.session_type} — ${s.module}</div>
                <div class="session-module" style="color:${color}">${s.session_type}</div>
                <div class="session-tip">${s.tip}</div>
              </div>
              <div class="session-icon">${s.emoji||"📚"}</div>
            </div>`;
          }).join("")}</div>
        </div>`;
      }).join("")}`;
    content.innerHTML = html;
  }

  function toggleDay(idx){document.getElementById("day-"+idx).classList.toggle("open");}
  function toggleSession(di,si){document.getElementById(`sess-${di}-${si}`).classList.toggle("expanded");}

  window.addEventListener("load",()=>{
    try{const raw=localStorage.getItem("eunoia_current_plan");if(raw)renderPlan(JSON.parse(raw));}
    catch(e){console.error(e);}
  });
</script>
</body>
</html>
